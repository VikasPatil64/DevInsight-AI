<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compare Developers — DevInsight AI</title>
    <meta name="description" content="Compare two GitHub developers side-by-side with scores, metrics, and a radar chart." />

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/dashboard.css">
</head>

<body>

<!-- ── Navigation ─────────────────────────────────────────── -->
<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-logo">🚀 <span>DevInsight</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Analyze</a>
            <a href="/compare" class="nav-link active">Compare</a>
        </div>
    </div>
</nav>

<!-- ── Main Container ─────────────────────────────────────── -->
<div class="dashboard-container">

    <div class="page-header">
        <a href="/" class="back-btn">← Back</a>
    </div>

    <h1 style="font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px;">
        Compare Developers
    </h1>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:0;">
        Enter two GitHub usernames to get a side-by-side analytics comparison.
    </p>

    <!-- Compare Form -->
    <div class="compare-form">
        <input type="text" id="user1" placeholder="First GitHub username" value="octocat" spellcheck="false">
        <input type="text" id="user2" placeholder="Second GitHub username" value="gaearon" spellcheck="false">
        <button onclick="compareUsers()" id="compareBtn">Compare →</button>
    </div>

    <!-- Error Banner -->
    <div id="errorBanner" style="display:none; background:rgba(239,68,68,0.10); border:1px solid rgba(239,68,68,0.25); border-radius:12px; padding:14px 18px; margin-bottom:16px; color:#fca5a5; font-size:14px; font-weight:500;"></div>

    <!-- Results Section -->
    <div id="results" style="display:none;">

        <!-- Side-by-Side Cards -->
        <div class="compare-container">
            <div id="user1Card" class="developer-card">
                <!-- Skeleton -->
                <div class="skeleton skeleton-avatar"></div>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-sub"></div>
                <div class="skeleton skeleton-line"></div>
                <div class="skeleton skeleton-line" style="width:70%"></div>
            </div>

            <div class="vs-divider">
                <div class="vs-badge">VS</div>
            </div>

            <div id="user2Card" class="developer-card">
                <!-- Skeleton -->
                <div class="skeleton skeleton-avatar"></div>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-sub"></div>
                <div class="skeleton skeleton-line"></div>
                <div class="skeleton skeleton-line" style="width:70%"></div>
            </div>
        </div>

        <!-- Winner Box -->
        <div id="winnerBox" class="winner-box" style="display:none;"></div>

        <!-- Radar Chart -->
        <div id="radarBox" class="radar-box" style="display:none;">
            <h3>Skills Radar</h3>
            <div class="radar-canvas-wrap">
                <canvas id="radarChart" height="380"></canvas>
            </div>
        </div>

    </div>
</div>

<script>
// ──────────────────────────────────────────────────────────────
// Chart.js global defaults
// ──────────────────────────────────────────────────────────────
Chart.defaults.color       = '#94a3b8';
Chart.defaults.borderColor = 'rgba(99,130,200,0.10)';
Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(5,13,31,0.95)';
Chart.defaults.plugins.tooltip.borderColor     = 'rgba(99,130,200,0.20)';
Chart.defaults.plugins.tooltip.borderWidth     = 1;
Chart.defaults.plugins.tooltip.padding         = 12;
Chart.defaults.plugins.tooltip.cornerRadius    = 10;

// ──────────────────────────────────────────────────────────────
// Helpers
// ──────────────────────────────────────────────────────────────
var radarChart = null;

function showError(msg) {
    var el = document.getElementById('errorBanner');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
}

function hideError() {
    document.getElementById('errorBanner').style.display = 'none';
}

function norm(val, max) {
    return Math.min(Math.round((val / max) * 100), 100);
}

function buildDevCard(data) {
    return [
        '<img src="' + data.avatar_url + '" alt="' + data.username + '">',
        '<h2>' + (data.name || data.username) + '</h2>',
        '<p>@' + data.username + '</p>',
        '<div class="cmp-score-box">',
        '  <h1>' + data.developer_score + '</h1>',
        '  <div style="font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);">' + (data.developer_category || '') + '</div>',
        '</div>',
        '<div class="cmp-stats-grid">',
        '  <div class="cmp-stat"><strong>📦 Repos</strong><span>' + data.public_repos + '</span></div>',
        '  <div class="cmp-stat"><strong>👥 Followers</strong><span>' + data.followers + '</span></div>',
        '  <div class="cmp-stat"><strong>⭐ Avg Stars</strong><span>' + data.analytics.average_stars + '</span></div>',
        '  <div class="cmp-stat"><strong>💻 Language</strong><span style="font-size:13px">' + data.analytics.most_used_language + '</span></div>',
        '</div>'
    ].join('');
}

function buildSkeletonCard() {
    return [
        '<div class="skeleton skeleton-avatar"></div>',
        '<div class="skeleton skeleton-title"></div>',
        '<div class="skeleton skeleton-sub"></div>',
        '<div class="skeleton skeleton-line"></div>',
        '<div class="skeleton skeleton-line" style="width:70%"></div>',
        '<div class="skeleton skeleton-line" style="width:50%"></div>'
    ].join('');
}

// ──────────────────────────────────────────────────────────────
// Radar Chart
// ──────────────────────────────────────────────────────────────
function renderRadar(d1, d2) {
    var radarBox = document.getElementById('radarBox');
    radarBox.style.display = 'block';

    var labels = ['Score','Repos','Followers','Avg Stars','Activity'];

    var vals1 = [
        d1.developer_score,
        norm(d1.public_repos, 150),
        norm(d1.followers, 2000),
        norm(d1.analytics.average_stars, 50),
        Math.max(0, 100 - norm(d1.analytics.days_since_last_update, 365))
    ];
    var vals2 = [
        d2.developer_score,
        norm(d2.public_repos, 150),
        norm(d2.followers, 2000),
        norm(d2.analytics.average_stars, 50),
        Math.max(0, 100 - norm(d2.analytics.days_since_last_update, 365))
    ];

    if (radarChart) { radarChart.destroy(); }

    var ctx = document.getElementById('radarChart').getContext('2d');
    radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: d1.name || d1.username,
                    data: vals1,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59,130,246,0.15)',
                    pointBackgroundColor: '#3b82f6',
                    pointBorderColor: '#050d1f',
                    pointRadius: 4,
                    borderWidth: 2
                },
                {
                    label: d2.name || d2.username,
                    data: vals2,
                    borderColor: '#06b6d4',
                    backgroundColor: 'rgba(6,182,212,0.12)',
                    pointBackgroundColor: '#06b6d4',
                    pointBorderColor: '#050d1f',
                    pointRadius: 4,
                    borderWidth: 2
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                r: {
                    min: 0,
                    max: 100,
                    grid:     { color: 'rgba(99,130,200,0.12)' },
                    angleLines:{ color: 'rgba(99,130,200,0.12)' },
                    pointLabels: { color: '#94a3b8', font: { size: 12, weight: '500' } },
                    ticks: {
                        color: '#475569',
                        backdropColor: 'transparent',
                        font: { size: 10 },
                        stepSize: 25
                    }
                }
            },
            plugins: {
                legend: {
                    labels: {
                        color: '#94a3b8',
                        padding: 20,
                        usePointStyle: true,
                        font: { size: 13, weight: '500' }
                    }
                }
            }
        }
    });
}

// ──────────────────────────────────────────────────────────────
// Main Compare Function
// ──────────────────────────────────────────────────────────────
async function compareUsers() {
    var user1 = document.getElementById('user1').value.trim();
    var user2 = document.getElementById('user2').value.trim();

    hideError();

    if (!user1 || !user2) {
        showError('Please enter both GitHub usernames to compare.');
        return;
    }

    var btn = document.getElementById('compareBtn');
    btn.textContent = 'Loading…';
    btn.disabled    = true;

    // Show skeleton loading state
    document.getElementById('results').style.display = 'block';
    document.getElementById('user1Card').innerHTML = buildSkeletonCard();
    document.getElementById('user2Card').innerHTML = buildSkeletonCard();
    document.getElementById('winnerBox').style.display = 'none';
    document.getElementById('radarBox').style.display  = 'none';

    try {
        var [res1, res2] = await Promise.all([
            fetch('/api/analyze/' + encodeURIComponent(user1)),
            fetch('/api/analyze/' + encodeURIComponent(user2))
        ]);

        var data1 = await res1.json();
        var data2 = await res2.json();

        if (data1.error) throw new Error(user1 + ': ' + data1.error);
        if (data2.error) throw new Error(user2 + ': ' + data2.error);

        // Populate cards
        document.getElementById('user1Card').innerHTML = buildDevCard(data1);
        document.getElementById('user2Card').innerHTML = buildDevCard(data2);

        // Winner Box
        var winnerBox = document.getElementById('winnerBox');
        winnerBox.style.display = 'block';
        var diff = Math.abs(data1.developer_score - data2.developer_score);

        if (data1.developer_score > data2.developer_score) {
            winnerBox.innerHTML = '<h2>🏆 ' + (data1.name || data1.username) + ' wins!</h2><p>' + data1.developer_score + ' vs ' + data2.developer_score + ' &mdash; <strong>' + diff + ' point lead</strong></p>';
        } else if (data2.developer_score > data1.developer_score) {
            winnerBox.innerHTML = '<h2>🏆 ' + (data2.name || data2.username) + ' wins!</h2><p>' + data2.developer_score + ' vs ' + data1.developer_score + ' &mdash; <strong>' + diff + ' point lead</strong></p>';
        } else {
            winnerBox.innerHTML = '<h2>🤝 It\'s a Tie!</h2><p>Both developers scored <strong>' + data1.developer_score + '</strong></p>';
        }

        // Radar Chart
        renderRadar(data1, data2);

    } catch (err) {
        document.getElementById('user1Card').innerHTML = '<div class="error">⚠ Could not load data</div>';
        document.getElementById('user2Card').innerHTML = '<div class="error">⚠ Could not load data</div>';
        showError(err.message || 'An error occurred. Please try again.');
    } finally {
        btn.textContent = 'Compare →';
        btn.disabled    = false;
    }
}

// Auto-load on page open
window.addEventListener('DOMContentLoaded', function() {
    compareUsers();
});
</script>

</body>
</html>
