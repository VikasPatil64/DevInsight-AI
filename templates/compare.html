<!DOCTYPE html>
<html>
<head>
    <title>Compare Developers - DevInsight</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <style>
        .compare-form {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }
        .compare-form input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #1e293b;
            color: white;
        }
        .compare-form button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .compare-form button:hover {
            background: #2563eb;
        }
        .compare-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .developer-card {
            background: #1b2233;
            border: 1px solid #2f3b52;
            border-radius: 14px;
            padding: 25px;
            text-align: center;
        }
        .developer-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
        }
        .vs-badge {
            font-size: 32px;
            font-weight: bold;
            color: #3b82f6;
            text-align: center;
            padding: 20px;
        }
        .winner-box {
            background: #1b2233;
            border: 1px solid #2f3b52;
            border-radius: 14px;
            padding: 25px;
            text-align: center;
            margin-top: 30px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #cbd5e1;
        }
        .error {
            color: #ef4444;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>
<div class="dashboard-container">
    <a href="/" class="back-btn">← Back to Search</a>
    
    <h1 style="margin-bottom: 20px;">Compare Two Developers</h1>
    
    <div class="compare-form">
        <input type="text" id="user1" placeholder="GitHub Username 1" value="octocat">
        <input type="text" id="user2" placeholder="GitHub Username 2" value="gaearon">
        <button onclick="compareUsers()">Compare →</button>
    </div>
    
    <div id="results" style="display: none;">
        <div class="compare-container">
            <div id="user1Card" class="developer-card">Loading...</div>
            <div id="user2Card" class="developer-card">Loading...</div>
        </div>
        <div id="winnerBox" class="winner-box"></div>
    </div>
</div>

<script>
async function compareUsers() {
    const user1 = document.getElementById('user1').value.trim();
    const user2 = document.getElementById('user2').value.trim();
    
    if (!user1 || !user2) {
        alert('Please enter both usernames');
        return;
    }
    
    // Show loading
    document.getElementById('results').style.display = 'block';
    document.getElementById('user1Card').innerHTML = '<div class="loading">Loading ' + user1 + '...</div>';
    document.getElementById('user2Card').innerHTML = '<div class="loading">Loading ' + user2 + '...</div>';
    document.getElementById('winnerBox').innerHTML = '';
    
    try {
        // Fetch both users in parallel
        const [response1, response2] = await Promise.all([
            fetch(`/api/analyze/${user1}`),
            fetch(`/api/analyze/${user2}`)
        ]);
        
        const data1 = await response1.json();
        const data2 = await response2.json();
        
        // Check for errors
        if (data1.error || data2.error) {
            throw new Error(data1.error || data2.error);
        }
        
        // Display User 1
        document.getElementById('user1Card').innerHTML = `
            <img src="${data1.avatar_url}" alt="${data1.username}">
            <h2>${data1.name || data1.username}</h2>
            <p>@${data1.username}</p>
            <div style="margin: 20px 0; padding: 15px; background: #1e293b; border-radius: 12px;">
                <h1 style="font-size: 48px; margin: 0;">${data1.developer_score}</h1>
                <p style="margin: 5px 0 0;">${data1.developer_category}</p>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><strong>📚 Repos</strong><br>${data1.public_repos}</div>
                <div><strong>👥 Followers</strong><br>${data1.followers}</div>
                <div><strong>⭐ Avg Stars</strong><br>${data1.analytics.average_stars}</div>
                <div><strong>💻 Language</strong><br>${data1.analytics.most_used_language}</div>
            </div>
        `;
        
        // Display User 2
        document.getElementById('user2Card').innerHTML = `
            <img src="${data2.avatar_url}" alt="${data2.username}">
            <h2>${data2.name || data2.username}</h2>
            <p>@${data2.username}</p>
            <div style="margin: 20px 0; padding: 15px; background: #1e293b; border-radius: 12px;">
                <h1 style="font-size: 48px; margin: 0;">${data2.developer_score}</h1>
                <p style="margin: 5px 0 0;">${data2.developer_category}</p>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><strong>📚 Repos</strong><br>${data2.public_repos}</div>
                <div><strong>👥 Followers</strong><br>${data2.followers}</div>
                <div><strong>⭐ Avg Stars</strong><br>${data2.analytics.average_stars}</div>
                <div><strong>💻 Language</strong><br>${data2.analytics.most_used_language}</div>
            </div>
        `;
        
        // Determine winner
        let winnerHtml = '';
        if (data1.developer_score > data2.developer_score) {
            winnerHtml = `
                <h2>🏆 Winner: ${data1.name || data1.username} 🏆</h2>
                <p>${data1.developer_score} vs ${data2.developer_score} (${data1.developer_score - data2.developer_score} point difference)</p>
            `;
        } else if (data2.developer_score > data1.developer_score) {
            winnerHtml = `
                <h2>🏆 Winner: ${data2.name || data2.username} 🏆</h2>
                <p>${data2.developer_score} vs ${data1.developer_score} (${data2.developer_score - data1.developer_score} point difference)</p>
            `;
        } else {
            winnerHtml = `<h2>🤝 It's a Tie! ${data1.developer_score} - ${data2.developer_score}</h2>`;
        }
        
        document.getElementById('winnerBox').innerHTML = winnerHtml;
        
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('user1Card').innerHTML = `<div class="error">❌ Error loading user</div>`;
        document.getElementById('user2Card').innerHTML = `<div class="error">❌ Error loading user</div>`;
        document.getElementById('winnerBox').innerHTML = `<div class="error">❌ ${error.message}</div>`;
    }
}

// Auto-load example on page load
window.onload = function() {
    compareUsers();
};
</script>

</body>
</html>
